<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brodeto Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans">
    <div class="max-w-md mx-auto p-4">
        
        <div class="bg-slate-900 rounded-3xl p-6 text-white shadow-xl mb-6">
            <p class="text-slate-400 text-xs uppercase tracking-widest font-black">Take-Home (Post 20% Tax)</p>
            <h1 id="monthTotal" class="text-5xl font-black mt-2 text-emerald-400">$0.00</h1>
            <div class="grid grid-cols-2 gap-4 mt-6 border-t border-slate-800 pt-4">
                <div>
                    <p class="text-slate-500 text-[10px] uppercase font-bold text-white">Net Tips</p>
                    <p id="tipsTotal" class="font-bold text-lg">$0.00</p>
                </div>
                <div>
                    <p class="text-slate-500 text-[10px] uppercase font-bold text-white">Total Tax</p>
                    <p id="taxTotal" class="font-bold text-lg text-rose-400">$0.00</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
            <div class="space-y-4">
                <input type="hidden" id="editId" value="">
                
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <button onclick="setRole('bartender')" id="btn-bartender" class="flex-1 py-2 rounded-lg text-xs font-black transition-all bg-white shadow-sm text-slate-900">BARTENDER ($10)</button>
                    <button onclick="setRole('server')" id="btn-server" class="flex-1 py-2 rounded-lg text-xs font-black transition-all text-gray-500">SERVER ($2.13)</button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-1">
                        <label class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Day</label>
                        <select id="day" class="w-full bg-gray-50 border-none p-3 rounded-xl mt-1 outline-none appearance-none">
                            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                            <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
                        </select>
                    </div>
                    <div class="col-span-1">
                        <label class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Date</label>
                        <input type="date" id="date" class="w-full bg-gray-50 border-none p-3 rounded-xl mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Gross Tips ($)</label>
                        <input type="number" id="tips" placeholder="0.00" class="w-full bg-gray-50 border-none p-3 rounded-xl mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Hours</label>
                        <input type="number" id="hours" placeholder="0.0" step="0.1" class="w-full bg-gray-50 border-none p-3 rounded-xl mt-1 outline-none">
                    </div>
                </div>

                <button onclick="saveShift()" id="saveBtn" class="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all mt-2 uppercase tracking-widest">
                    Add Shift
                </button>
                <button onclick="cancelEdit()" id="cancelBtn" class="hidden w-full bg-gray-200 text-gray-600 font-black py-3 rounded-2xl mt-1 uppercase text-xs">
                    Cancel Edit
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-3 px-2">
            <h3 class="text-gray-400 font-black text-xs uppercase tracking-widest">Recent Shifts (Tap to edit)</h3>
        </div>
        <div id="history" class="space-y-3"></div>
        
        <button onclick="clearData()" class="w-full mt-10 text-gray-300 text-[10px] uppercase font-bold hover:text-red-400 transition-colors">Reset Database</button>
    </div>

    <script>
        let currentRole = 'bartender';
        const rates = { bartender: 10.00, server: 2.13 };
        
        // Auto-set today's date and day
        const today = new Date();
        document.getElementById('date').valueAsDate = today;
        document.getElementById('day').value = today.toLocaleDateString('en-US', { weekday: 'long' });

        function setRole(role) {
            currentRole = role;
            document.getElementById('btn-bartender').className = role === 'bartender' ? "flex-1 py-2 rounded-lg text-xs font-black transition-all bg-white shadow-sm text-slate-900" : "flex-1 py-2 rounded-lg text-xs font-black transition-all text-gray-500";
            document.getElementById('btn-server').className = role === 'server' ? "flex-1 py-2 rounded-lg text-xs font-black transition-all bg-white shadow-sm text-slate-900" : "flex-1 py-2 rounded-lg text-xs font-black transition-all text-gray-500";
        }

        function saveShift() {
            const rawTips = parseFloat(document.getElementById('tips').value) || 0;
            const hours = parseFloat(document.getElementById('hours').value) || 0;
            const editId = document.getElementById('editId').value;
            
            if (hours <= 0 && rawTips <= 0) return alert("Enter data first");

            const tipOut = rawTips * 0.15;
            const netTips = rawTips - tipOut;
            const hourlyTotal = hours * rates[currentRole];
            const tax = (netTips + hourlyTotal) * 0.20;
            const netPay = (netTips + hourlyTotal) - tax;

            const shift = {
                id: editId ? parseInt(editId) : Date.now(),
                day: document.getElementById('day').value,
                date: document.getElementById('date').value,
                role: currentRole,
                rawTips, tipOut, netTips, hours, hourlyTotal, tax, netPay
            };

            let shifts = JSON.parse(localStorage.getItem('brodeto_v3') || '[]');
            if (editId) {
                shifts = shifts.map(s => s.id === shift.id ? shift : s);
            } else {
                shifts.unshift(shift);
            }
            
            localStorage.setItem('brodeto_v3', JSON.stringify(shifts));
            cancelEdit();
            render();
        }

        function editShift(id) {
            const shifts = JSON.parse(localStorage.getItem('brodeto_v3') || '[]');
            const s = shifts.find(x => x.id === id);
            if (!s) return;

            document.getElementById('editId').value = s.id;
            document.getElementById('day').value = s.day;
            document.getElementById('date').value = s.date;
            document.getElementById('tips').value = s.rawTips;
            document.getElementById('hours').value = s.hours;
            setRole(s.role);

            document.getElementById('saveBtn').innerText = "Update Shift";
            document.getElementById('saveBtn').classList.replace('bg-emerald-500', 'bg-blue-500');
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('editId').value = "";
            document.getElementById('tips').value = "";
            document.getElementById('hours').value = "";
            document.getElementById('saveBtn').innerText = "Add Shift";
            document.getElementById('saveBtn').classList.replace('bg-blue-500', 'bg-emerald-500');
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function render() {
            const historyDiv = document.getElementById('history');
            const shifts = JSON.parse(localStorage.getItem('brodeto_v3') || '[]');
            let tNet = 0, tTips = 0, tTax = 0;

            historyDiv.innerHTML = shifts.map(s => {
                tNet += s.netPay; tTips += s.netTips; tTax += s.tax;
                return `
                    <div onclick="editShift(${s.id})" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-start active:bg-gray-50">
                        <div>
                            <p class="text-[10px] font-black text-emerald-600 uppercase tracking-tighter">${s.day}, ${s.date} • ${s.role}</p>
                            <div class="text-[11px] text-gray-500 leading-tight mt-1">
                                <p><strong>Hours:</strong> ${s.hours} hr ($${s.hourlyTotal.toFixed(2)})</p>
                                <p><strong>Tip Out (15%):</strong> -$${s.tipOut.toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black text-slate-900">$${s.netPay.toFixed(2)}</p>
                            <p class="text-[9px] text-rose-400 font-bold">-$${s.tax.toFixed(2)} TAX</p>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('monthTotal').innerText = `$${tNet.toFixed(2)}`;
            document.getElementById('tipsTotal').innerText = `$${tTips.toFixed(2)}`;
            document.getElementById('taxTotal').innerText = `$${tTax.toFixed(2)}`;
        }

        function clearData() { if(confirm("Erase all data?")) { localStorage.clear(); render(); } }
        render();
    </script>
</body>
</html>
